<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ТБ Тренажёр</title>
<style>
  :root{
    --ink:#1a2332;
    --paper:#f4f2ec;
    --paper-raised:#ffffff;
    --line:#d8d3c4;
    --accent:#1f5e4a;
    --accent-soft:#dce8e2;
    --warn:#8a2e2e;
    --warn-soft:#f3dede;
    --gold:#a3793a;
    --muted:#6b6457;
    --radius:2px;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{
    margin:0; padding:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Georgia','Times New Roman',serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  body{
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.02) 39px, rgba(0,0,0,0.02) 40px);
  }

  .app{
    max-width:720px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ===== HEADER STRIP ===== */
  .header-strip{
    background:var(--ink);
    color:var(--paper);
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:'Helvetica Neue',Arial,sans-serif;
    letter-spacing:0.08em;
    font-size:11px;
    text-transform:uppercase;
  }
  .header-strip .mark{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .header-strip .mark::before{
    content:"";
    width:8px;height:8px;
    background:var(--gold);
    display:inline-block;
    border-radius:50%;
  }
  .header-strip .progress-text{
    font-variant-numeric:tabular-nums;
    opacity:0.85;
  }

  /* ===== SCREENS ===== */
  .screen{
    display:none;
    flex:1;
    flex-direction:column;
    padding:28px 22px 40px;
  }
  .screen.active{ display:flex; }

  /* ===== MENU ===== */
  #screen-menu{
    justify-content:center;
    align-items:stretch;
    text-align:center;
  }
  .menu-eyebrow{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
  }
  .menu-title{
    font-size:34px;
    line-height:1.15;
    margin:0 0 6px;
    font-weight:400;
    letter-spacing:-0.01em;
  }
  .menu-sub{
    font-family:'Helvetica Neue',Arial,sans-serif;
    color:var(--muted);
    font-size:14px;
    margin:0 0 36px;
  }
  .menu-sub b{ color:var(--ink); }

  .mode-card{
    display:block;
    width:100%;
    text-align:left;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-left:4px solid var(--accent);
    border-radius:var(--radius);
    padding:18px 20px;
    margin-bottom:14px;
    cursor:pointer;
    font-family:'Helvetica Neue',Arial,sans-serif;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .mode-card:active{ transform:scale(0.98); }
  .mode-card.test{ border-left-color:var(--warn); }

  .mode-card .mc-label{
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:6px;
    font-weight:700;
  }
  .mode-card.test .mc-label{ color:var(--warn); }
  .mode-card .mc-title{
    font-family:Georgia,serif;
    font-size:20px;
    color:var(--ink);
    margin-bottom:4px;
  }
  .mode-card .mc-desc{
    font-size:13px;
    color:var(--muted);
    line-height:1.4;
  }

  .menu-footer{
    margin-top:24px;
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.04em;
  }

  /* ===== QUIZ SCREEN ===== */
  #screen-quiz{ justify-content:flex-start; }

  .progress-track{
    width:100%;
    height:3px;
    background:var(--line);
    margin-bottom:26px;
    position:relative;
  }
  .progress-fill{
    position:absolute; top:0; left:0; height:100%;
    background:var(--accent);
    transition:width 0.3s ease;
  }

  .q-number{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:10px;
  }

  .q-text{
    font-size:19px;
    line-height:1.45;
    margin:0 0 26px;
    font-weight:400;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:10px;
  }

  .option{
    text-align:left;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:15px;
    line-height:1.4;
    color:var(--ink);
    cursor:pointer;
    display:flex;
    align-items:flex-start;
    gap:12px;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .option:active{ background:#efece3; }

  .option .bullet{
    flex:none;
    width:20px; height:20px;
    border:1.5px solid var(--muted);
    border-radius:50%;
    margin-top:1px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-family:'Helvetica Neue',Arial,sans-serif;
  }

  .option.selected{
    border-color:var(--ink);
    background:#ece9e0;
  }
  .option.selected .bullet{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--paper);
  }

  .option.correct{
    border-color:var(--accent);
    background:var(--accent-soft);
  }
  .option.correct .bullet{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .option.correct .bullet::after{ content:"✓"; }

  .option.incorrect{
    border-color:var(--warn);
    background:var(--warn-soft);
  }
  .option.incorrect .bullet{
    background:var(--warn);
    border-color:var(--warn);
    color:#fff;
  }
  .option.incorrect .bullet::after{ content:"✕"; }

  .multi-hint{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:12px;
    color:var(--muted);
    margin-bottom:16px;
    font-style:italic;
  }

  .quiz-actions{
    margin-top:auto;
    padding-top:24px;
  }

  .btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:var(--radius);
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:14px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    font-weight:700;
    cursor:pointer;
    transition:opacity 0.15s ease, transform 0.1s ease;
  }
  .btn:active{ transform:scale(0.98); }
  .btn-primary{
    background:var(--ink);
    color:var(--paper);
  }
  .btn-primary:disabled{
    background:var(--line);
    color:var(--muted);
    cursor:not-allowed;
  }
  .btn-ghost{
    background:transparent;
    color:var(--ink);
    border:1px solid var(--line);
    margin-top:10px;
  }

  /* ===== RESULTS ===== */
  #screen-result{ justify-content:flex-start; }

  .result-hero{
    text-align:center;
    padding:20px 0 30px;
    border-bottom:1px solid var(--line);
    margin-bottom:24px;
  }
  .result-score{
    font-size:56px;
    line-height:1;
    margin:0 0 8px;
    font-weight:400;
  }
  .result-score .slash{ color:var(--muted); font-size:32px; }
  .result-percent{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:14px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:4px 14px;
    border-radius:20px;
    display:inline-block;
  }
  .result-percent.pass{ background:var(--accent-soft); color:var(--accent); }
  .result-percent.fail{ background:var(--warn-soft); color:var(--warn); }

  .review-title{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:16px;
  }

  .review-item{
    border:1px solid var(--line);
    border-left:4px solid var(--warn);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:14px;
    background:var(--paper-raised);
  }
  .review-q{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--warn);
    margin-bottom:8px;
  }
  .review-text{
    font-size:15px;
    line-height:1.4;
    margin:0 0 12px;
  }
  .review-opt{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:13px;
    line-height:1.5;
    padding:6px 0;
    display:flex;
    gap:8px;
  }
  .review-opt .tag{
    flex:none;
    font-size:11px;
    font-weight:700;
  }
  .review-opt.is-correct .tag{ color:var(--accent); }
  .review-opt.is-wrong .tag{ color:var(--warn); }
  .review-opt.is-correct{ color:var(--ink); }
  .review-opt.is-wrong{ color:var(--muted); text-decoration:line-through; }

  .no-errors{
    text-align:center;
    padding:30px 20px;
    font-family:'Helvetica Neue',Arial,sans-serif;
    color:var(--accent);
    font-size:14px;
  }

  @media (max-width:380px){
    .menu-title{ font-size:28px; }
    .q-text{ font-size:17px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header-strip">
    <span class="mark">ТБ ТРЕНАЖЁР</span>
    <span class="progress-text" id="header-progress"></span>
  </div>

  <!-- MENU -->
  <section class="screen active" id="screen-menu">
    <div class="menu-eyebrow">Подготовка к проверке знаний</div>
    <h1 class="menu-title">Транспортная<br>безопасность</h1>
    <p class="menu-sub">База из <b id="q-count">0</b> вопросов. Каждый запуск — новый порядок.</p>

    <button class="mode-card" id="btn-train" type="button">
      <div class="mc-label">Режим 1</div>
      <div class="mc-title">Обучение</div>
      <div class="mc-desc">Сразу видно правильный ответ. Для запоминания материала.</div>
    </button>

    <button class="mode-card test" id="btn-test" type="button">
      <div class="mc-label">Режим 2</div>
      <div class="mc-title">Тест</div>
      <div class="mc-desc">Без подсказок. В конце — разбор всех ошибок.</div>
    </button>

    <div class="menu-footer">Вопросы и варианты перемешиваются случайно</div>
  </section>

  <!-- QUIZ -->
  <section class="screen" id="screen-quiz">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="q-number" id="q-number"></div>
    <h2 class="q-text" id="q-text"></h2>
    <div class="multi-hint" id="multi-hint" style="display:none;">Выберите все верные варианты</div>
    <div class="options" id="options"></div>
    <div class="quiz-actions">
      <button class="btn btn-primary" id="btn-next">Далее →</button>
    </div>
  </section>

  <!-- RESULT -->
  <section class="screen" id="screen-result">
    <div class="result-hero">
      <div class="result-score"><span id="res-correct">0</span><span class="slash">/</span><span id="res-total">0</span></div>
      <div class="result-percent" id="res-percent-badge">0%</div>
    </div>
    <div id="review-wrap"></div>
    <div class="quiz-actions">
      <button class="btn btn-ghost" id="btn-to-menu">В меню</button>
    </div>
  </section>
</div>
