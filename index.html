и объекта транспортной инфраструктуры (ОТИ)","План обеспечения транспортной безопасности транспортного средства (ТС)","Паспорт обеспечения транспортной безопасности объекта транспортной инфраструктуры и паспорт обеспечения транспортной безопасности транспортного средства","Организационно-распорядительная документация"],"correct":[2]},{"text":"6. В каком документе должна содержаться информация о местах размещения и составе технических средств обеспечения транспортной безопасности?","options":["В плане обеспечения транспортной безопасности ОТИ или ТС и в паспорте обеспечения транспортной безопасности ОТИ или ТС","В результатах оценки уязвимости объекта транспортной инфраструктуры","В документах, предоставляемых в Федеральное агентство морского и речного транспорта для категорирования","Действующими нормативными правовыми актами в области обеспечения транспортной безопасности данный вопрос не регламентируется"],"correct":[0]},{"text":"7. Каким нормативным правовым актом утверждены Требования по соблюдению транспортной безопасности для физических лиц, следующих либо находящихся на ОТИ или ТС... ?","options":["постановлением Правительства РФ от 01.10.2020 № 1586","постановлением Правительства РФ от 01.06.2023 № 906","постановлением Правительства РФ от 15.11.2014 г. № 1208","постановлением Правительства РФ от 29.06.2021 г. № 1051"],"correct":[2]},{"text":"8. В каком нормативном правовом акте закреплен порядок получения СТИ и перевозчиками информации по вопросам обеспечения транспортной безопасности?","options":["Приказ Минтранса России от 12.04.2010 № 87","Приказ Минтранса России от 11.02.2010 № 34","Приказ Минтранса России от 05.10.2020 г. N 409","Приказ Минтранса России от 29.01.2010 № 22"],"correct":[2]},{"text":"9. Каким нормативно-правовым актом утверждены Правила категорирования и количества категорий ОТИ?","options":["Федеральный закон РФ от 09.02.2007 г. №16 ФЗ «О транспортной безопасности»","Приказ Минтранса РФ от 11 февраля 2010 г. №34...","Федеральный закон от 3 февраля 2014 г. № 15-ФЗ...","Постановление Правительства Российской Федерации от 03.10.2020 № 1595 «Об утверждении Правил категорирования и установления количества категорий объектов транспортный инфраструктуры»"],"correct":[3]},{"text":"10. Укажите федеральные органы исполнительной власти, уполномоченные Правительством Российской Федерации осуществлять функции по оказанию государственных услуг в области обеспечения транспортной безопасности.","options":["Федеральная служба безопасности РФ","Ространснадзор","Министерство внутренних дел РФ","Федеральные агентства Минтранса России по видам транспорта"],"correct":[3]},{"text":"11. Кем осуществляется категорирование объектов транспортной инфраструктуры?","options":["субъектом транспортной инфраструктуры","правительством Российской Федерации","компетентными органами в области обеспечения транспортной безопасности","министерством транспорта Российской Федерации"],"correct":[2]},{"text":"12. Каким органом исполнительной власти в соответствии с Федеральным законом «О транспортной безопасности» устанавливаются Требования по обеспечению транспортной безопасности по видам транспорта...?","options":["Правительством Российской Федерации","Министерством транспорта Российской Федерации","Компетентным органом в области обеспечения транспортной безопасности в установленной сфере деятельности","Федеральной службой безопасности Российской Федерации"],"correct":[0]},{"text":"13. Транспортная безопасность – это:","options":["объект транспортной инфраструктуры, его часть, транспортное средство...","состояние защищенности объектов транспортной инфраструктуры и транспортных средств от актов незаконного вмешательства","отнесение объектов транспортной инфраструктуры к определенным категориям...","опасные грузы, отнесенные Правительством Российской Федерации к грузам..."],"correct":[1]},{"text":"14. Кем являются юридические лица, индивидуальные предприниматели и физические лица, являющиеся собственниками ОТИ и (или) ТС... согласно Федеральному закону № 16-ФЗ?","options":["субъекты транспортной инфраструктуры (СТИ)","аттестующие организации","специализированные организации в области обеспечения транспортной безопасности","компетентные органы в области обеспечения транспортной безопасности"],"correct":[0]},{"text":"15. Что понимается под объектами транспортной инфраструктуры (ОТИ)?","options":["определение перечня зданий, сооружений, установок...","любые здания, сооружения, установки и оборудование...","объекты транспортной инфраструктуры по видам транспорта определяются Постановлениями...","технологический комплекс, определенный п.5 ст.1 Федерального закона от 9 февраля 2007 г. № 16-ФЗ «О транспортной безопасности»"],"correct":[3]},{"text":"16. Транспортные средства (ТС) – это:","options":["устройства, предназначенные для перевозки физических лиц, грузов, багажа, ручной клади, личных вещей, животных или оборудования, установленных на указанных транспортных средствах устройств, в значениях, определенных транспортными кодексами и уставами","опасные грузы, отнесенные Правительством Российской Федерации к грузам...","технологический комплекс","юридические лица, аккредитованные компетентными органами..."],"correct":[0]},{"text":"17. Транспортный комплекс – это:","options":["выполнение физическими лицами, следующими либо находящимися на объектах...","степень защищенности транспортного комплекса...","ОТИ и СТИ, ТС","юридические лица, аккредитованные компетентными органами..."],"correct":[2]},{"text":"18. Какие технические средства обеспечения транспортной безопасности подлежат обязательной сертификации?","options":["организационно-техническая совокупность аппаратно-программных средств, используемая по единому плану и замыслу и предназначенная для сбора, обработки, регистрации и представления полномочным государственным органам информации от технических средств обеспечения транспортной безопасности, а также для дистанционного управления и контроля работоспособности этих средств и используемых ими каналов связи, эксплуатируемая, либо планируемая к установке на этапе проектирования ОТИ в целях выполнения требований.","аппаратно-программные средства для сбора, обработки информации, дистанционного управления в целях выполнения требований","организационно-техническая совокупность аппаратно-программных средств... в целях выполнения требований","организационно-техническая совокупность аппаратно- программных средств... планируемая к установке на этапе проектирования объекта..."],"correct":[0]},{"text":"19. Сертификация технических средств обеспечения транспортной безопасности в отношении систем и средств досмотра, интеллектуального видеонаблюдения возлагается на:","options":["Министерство внутренних дел Российской Федерации","Федеральную службу безопасности Российской Федерации","Министерство Российской Федерации по делам гражданской обороны, чрезвычайным ситуациям...","Министерство цифрового развития, связи и массовых коммуникаций Российской Федерации"],"correct":[1]},{"text":"20. Сертификация технических средств обеспечения транспортной безопасности в отношении систем и средств сигнализации, контроля доступа, видеонаблюдения, аудио- и видеозаписи возлагается на:","options":["Министерство внутренних дел Российской Федерации","Федеральную службу безопасности Российской Федерации","Министерство Российской Федерации по делам гражданской обороны...","Министерство цифрового развития, связи и массовых коммуникаций Российской Федерации"],"correct":[0]},{"text":"21. Сертификация технических средств обеспечения транспортной безопасности в отношении технических средств оповещения возлагается на:","options":["Министерство внутренних дел Российской Федерации","Федеральную службу безопасности Российской Федерации","Министерство Российской Федерации по делам гражданской обороны, чрезвычайным ситуациям и ликвидации последствий стихийных бедствий","Министерство цифрового развития, связи и массовых коммуникаций Российской Федерации"],"correct":[2]},{"text":"22. Сертификация технических средств обеспечения транспортной безопасности в отношении средств связи, приема и передачи информации возлагается на:","options":["Министерство внутренних дел Российской Федерации","Федеральную службу безопасности Российской Федерации","Министерство Российской Федерации по делам гражданской обороны...","Министерство цифрового развития, связи и массовых коммуникаций Российской Федерации"],"correct":[3]},{"text":"23. Законность; соблюдение баланса интересов личности, общества и государства; взаимная ответственность... согласно статье 3 Федерального закона № 16-ФЗ «О транспортной безопасности» это:","options":["принципы обеспечения транспортной безопасности","задачи обеспечения транспортной безопасности","обязанности субъекта транспортной инфраструктуры","цели обеспечения транспортной безопасности"],"correct":[0]},{"text":"24. Лица, ответственные за обеспечение транспортной безопасности ОТИ назначаются:","options":["внутренним организационно-распорядительным документом СТИ","внутренним организационно-распорядительным документом СТИ, по согласованию с территориальными подразделениями...","приказом Федерального агентства морского и речного транспорта","приказом Федерального агентства морского и речного транспорта, по согласованию с территориальными подразделениями..."],"correct":[0]},{"text":"25. Обеспечение транспортной безопасности ОТИ и ТС возлагается на:","options":["Федеральные органы исполнительной власти","СТИ, перевозчиков, если иное не установлено настоящим Федеральным законом и иными федеральными законами","органы местного самоуправления","Министерство транспорта Российской Федерации"],"correct":[1]},{"text":"26. В отношении каких ТС применяется Постановление Правительства РФ № 1637 «Об утверждении требований по обеспечению транспортной безопасности...»?","options":["всех транспортных средств морского и внутреннего водного транспорта","судов, используемых в целях торгового мореплавания, за исключением судов, используемых для санитарного, карантинного и другого контроля...","судов, используемых на внутренних водных путях для перевозки пассажиров, за исключением прогулочных судов...","верны ответы 2 и 3"],"correct":[3]},{"text":"27. Что из перечисленного не относится к ОТИ морского и речного транспорта на которые распространяется действие Федерального закона «О транспортной безопасности»?","options":["порты, которые расположены на внутренних водных путях и в которых не осуществляются посадка (высадка) пассажиров и (или) перевалка грузов повышенной опасности","искусственные острова, установки, сооружения, расположенные в территориальных морях Российской Федерации","морские терминалы","судоходные гидротехнические сооружения"],"correct":[0]},{"text":"28. Какие органы исполнительной власти подлежат обязательному незамедлительному информированию субъектами транспортной инфраструктуры и перевозчиками об угрозах совершения и о совершении АНВ в деятельность ОТИ и ТС?","options":["Компетентный орган в области обеспечения транспортной безопасности и территориальные управления Федеральной службы по надзору в сфере транспорта","Территориальные органы Министерства внутренних дел... Министерство Российской Федерации по делам гражданской обороны...","Министерство Российской Федерации по делам гражданской обороны... а также в территориальные и муниципальные службы спасения","Компетентный орган в области обеспечения транспортной безопасности и уполномоченные подразделения Федеральной службы безопасности Российской Федерации, Министерства внутренних дел Российской Федерации, а также территориальные управления Федеральной службы по надзору в сфере транспорта."],"correct":[3]},{"text":"29. Какие органы исполнительной власти не входят в перечень государственных органов, подлежащих обязательному незамедлительному информированию СТИ и перевозчиками об угрозах совершения и/или совершении АНВ в деятельность ОТИ/ТС?","options":["Министерство Российской Федерации по делам гражданской обороны, чрезвычайным ситуациям и ликвидации последствий стихийных бедствий или его территориальные органы","Федеральная служба по надзору в сфере транспорта и ее территориальные органы","Федеральная служба безопасности Российской Федерации","Органы внутренних дел Российской Федерации и их уполномоченные структурные подразделения"],"correct":[0]},{"text":"30. В течении какого времени СТИ и перевозчики обязаны информировать Росморречфлот и уполномоченные подразделения органов ФСБ России, органов внутренних дел и Ространснадзора об угрозах совершения и (или) о совершении АНВ?","options":["незамедлительно","в течение 12 часов после получения сведений или факта совершения АНВ","в течение одних суток после получения сведений или факта совершения АНВ","в течение часа после детальной проверки полученных сведений"],"correct":[0]},{"text":"31. Какой срок хранения установлен для носителей информации об угрозах совершения и о совершении актов незаконного вмешательства на ОТИ и ТС, подтверждающий факт передачи информации государственным органам?","options":["не менее 15 дней","не менее 5 дней","не менее одного месяца","не менее 10 дней"],"correct":[2]},{"text":"32. Сколько уровней безопасности ОТИ и ТС установлено согласно постановлению Правительства Российской Федерации № 2344?","options":["2 уровня безопасности","3 уровня безопасности","5 уровней безопасности","7 уровней безопасности"],"correct":[1]},{"text":"33. Какой уровень безопасности определяет «степень защищенности транспортного комплекса от потенциальных угроз, заключающихся в наличии совокупности вероятных условий и факторов...»?","options":["уровень безопасности №2","уровень безопасности №1","уровень безопасности №4","уровень безопасности №3"],"correct":[1]},{"text":"34. Какой уровень безопасности определяет «степень защищенности транспортного комплекса от непосредственных угроз, заключающихся в наличии совокупности конкретных условий и факторов...»?","options":["уровень безопасности №1","уровень безопасности №2","уровень безопасности №4","уровень безопасности №3"],"correct":[1]},{"text":"35. Какой уровень безопасности определяет «степень защищенности транспортного комплекса от прямых угроз, заключающихся в наличии совокупности условий и факторов...»?","options":["уровень безопасности №1","уровень безопасности №4","уровень безопасности №3","уровень безопасности №2"],"correct":[2]},{"text":"36. Какой уровень безопасности действует постоянно, если не объявлен иной уровень безопасности?","options":["уровень безопасности №2","уровень безопасности №1","уровень безопасности №4","уровень безопасности №3"],"correct":[1]},{"text":"37. На какой срок могут объявляться (устанавливаться) уровни безопасности ОТИ и ТС №2 и №3 как в отношении одного ОТИ и (или) ТС, так и в отношении группы?","options":["на 6 месяцев","не более 30 суток","не более 15 суток","на 2 месяца"],"correct":[2]},{"text":"38. Уровни безопасности объектов транспортной инфраструктуры и транспортных средств №2 и №3 могут объявляться (устанавливаться) на срок не более 15 суток в отношении:","options":["одного объекта транспортной инфраструктуры, транспортного средства","группы (2 и более) объектов транспортной инфраструктуры и (или) транспортных средств","верный ответ отсутствует","верны ответы 1 и 2"],"correct":[3]},{"text":"39. Уровни безопасности ОТИ и ТС №2 и №3 объявляются (устанавливаются) и отменяются субъектами транспортной инфраструктуры на основании:","options":["Верны варианты 2 и 3.","решения руководителей образованных в соответствии с Указом Президента РФ от 15 февраля 2006 г. № 116 \"О мерах по противодействию терроризму\"...","решения Министра внутренних дел Российской Федерации либо Министра транспорта Российской Федерации...","Неверны все варианты"],"correct":[0]},{"text":"40. Укажите уполномоченное должностное лицо, информирующее субъекты транспортной инфраструктуры, перевозчиков... о решении Министра внутренних дел РФ об изменении степени угрозы...","options":["уполномоченное должностное лицо Федеральной службы по надзору в сфере транспорта через территориальные органы либо самостоятельно","уполномоченное должностное лицо Министерства транспорта Российской Федерации","уполномоченное должностное лицо Министерства внутренних дел Российской Федерации через территориальные органы...","Верны все варианты"],"correct":[0]},{"text":"41. Укажите уполномоченное должностное лицо, информирующее субъекты транспортной инфраструктуры, перевозчиков... о решении Министра транспорта РФ об изменении степени угрозы...","options":["уполномоченное должностное лицо Федеральной службы по надзору в сфере транспорта через территориальные органы либо самостоятельно","уполномоченное должностное лицо Министерства транспорта Российской Федерации","уполномоченное должностное лицо Министерства внутренних дел Российской Федерации через территориальные органы...","Верны все варианты"],"correct":[0]},{"text":"42. Какое количество потенциальных угроз определено приказом №52/112/134 Минтранса, ФСБ и МВД России?","options":["5 (пять)","7 (семь)","8 (восемь)","9 (девять)"],"correct":[3]},{"text":"43. Допуск к носителям информации, содержащим информацию ограниченного доступа, могут иметь:","options":["руководитель секретного отдела","два сотрудника с допуском к данной информации","все работники организации","только работники организаций, отвечающие требованиям законодательства о транспортной безопасности (ст. 10 Федерального закона от 09.02.2007 №16-ФЗ «О транспортной безопасности»)"],"correct":[3]},{"text":"44. Оценка уязвимости ОТИ проводится:","options":["Министерством транспорта Российской Федерации","специализированными организациями в области обеспечения транспортной безопасности с учетом требований по обеспечению транспортной безопасности на основе публичного договора","субъектом транспортной инфраструктуры","Министерством внутренних дел Российской Федерации"],"correct":[1]},{"text":"45. Оценка уязвимости судов ледокольного флота, используемых для проводки по морским путям, судов, в отношении которых применяются правила торгового мореплавания... проводится:","options":["только субъектом транспортной инфраструктуры","только специализированными организациями в области обеспечения транспортной безопасности...","субъектами транспортной инфраструктуры либо специализированными организациями в области обеспечения транспортной безопасности с учетом требований по обеспечению транспортной безопасности на основе публичного договора","Федеральным агентством морского и речного транспорта"],"correct":[2]},{"text":"46. Сведения о результатах проведенной оценки уязвимости ОТИ, судов ледокольного флота... являются информацией:","options":["свободного доступа","государственной тайной","засекреченной","ограниченного доступа"],"correct":[3]},{"text":"47. Сколько экземпляров утверждённого паспорта обеспечения транспортной безопасности ОТИ и (или) ТС направляет СТИ в компетентный орган в области обеспечения транспортной безопасности?","options":["Один экземпляр","Два экземпляра","Электронный экземпляр","Два экземпляра и электронная копия"],"correct":[3]},{"text":"48. В какой срок утвержденный паспорт обеспечения транспортной безопасности ОТИ и (или) ТС направляется СТИ в компетентный орган в области обеспечения транспортной безопасности?","options":["в течение шести месяцев","в течение семи дней","в течение трёх месяцев","в течение одного месяца"],"correct":[1]},{"text":"49. Реализация планов обеспечения транспортной безопасности ОТИ и (или) ТС осуществляется:","options":["сразу после утверждения","в течение месяца после утверждения","поэтапно","незамедлительно с момента получения"],"correct":[2]},{"text":"50. В какой последовательности осуществляется работа в сфере реализации функций системы мер по обеспечению транспортной безопасности ОТИ, подлежащих категорированию?","options":["категорирование, оценка уязвимости, планирование мер по обеспечению транспортной безопасности.","категорирование, оценка уязвимости, планирование и реализация мер по обеспечению транспортной безопасности","оценка уязвимости, категорирование, разработка Планов обеспечения транспортной безопасности","категорирование, согласование групп идентичных транспортных средств, разработка Планов обеспечения транспортной безопасности"],"correct":[1]},{"text":"51. Что определено в плане обеспечения транспортной безопасности ОТИ и ТС, согласно приказу Минтранса России № 34 «Об утверждении Порядка разработки планов обеспечения транспортной безопасности ОТИ и/или ТС»?","options":["система мер для защиты ОТИ или ТС от потенциальных, непосредственных и прямых угроз совершения акта незаконного вмешательства, а также при подготовке и проведении контртеррористической операции","места размещения КПП","количество сил подразделения транспортной безопасности","оценка прямых угроз совершения акта незаконного вмешательства"],"correct":[0]},{"text":"52. Сколько планов разрабатывается для двух и более ОТИ или ТС?","options":["один для всех ОТИ одной категории и ТС","на усмотрение субъекта транспортной инфраструктуры","отдельно для каждого ОТИ и ТС","один на каждую категорию ОТИ и отдельно на каждое ТС"],"correct":[2]},{"text":"53. Дайте определение понятия «силы обеспечения транспортной безопасности»","options":["Лица, ответственные за обеспечение транспортной безопасности в СТИ, на ОТИ, ТС, включая персонал субъекта транспортной инфраструктуры или подразделения транспортной безопасности, непосредственно связанный с обеспечением транспортной безопасности ОТИ или ТС.","Должностное лицо компании, ответственное за охрану, должностное лицо портового средства...","Органы, обеспечивающие безопасное ведение работ на транспорте...","Федеральные органы государственной власти, принимающие участие в обеспечении национальной безопасности..."],"correct":[0]},{"text":"54. Уберите лишнее. Работы, непосредственно связанные с обеспечением транспортной безопасности, не вправе выполнять лица:","options":["имеющие непогашенную или неснятую судимость за совершение умышленного преступления","страдающие психическими заболеваниями, алкоголизмом, наркоманией...","прошедшие аттестацию сил обеспечения транспортной безопасности","сообщившие заведомо ложные сведения о себе при приеме на работу, непосредственно связанную с обеспечением транспортной безопасности"],"correct":[2]},{"text":"55. Работникам, прошедшим обучение, освоившим дополнительную профессиональную программу по направлению подготовки «Транспортная безопасность» и успешно прошедшим итоговую аттестацию, выдается:","options":["аттестат об обучении по программе «Транспортная безопасность»","удостоверение о повышении квалификации","свидетельство о повышении квалификации в области обеспечения транспортной безопасности","свидетельство об аттестации"],"correct":[1]},{"text":"56. Аттестация сил обеспечения транспортной безопасности – это:","options":["определение степени защищенности объектов транспортной инфраструктуры","лица, ответственные за обеспечение транспортной безопасности в субъекте транспортной инфраструктуры","установление соответствия знаний, умений, навыков сил обеспечения транспортной безопасности, личностных (психофизиологических) качеств, уровня физической подготовки отдельных категорий сил обеспечения транспортной безопасности требованиям законодательства РФ... в целях принятия субъектом транспортной инфраструктуры решения о допуске...","опасные грузы, отнесенные Правительством Российской Федерации к грузам, представляющим повышенную опасность..."],"correct":[2]},{"text":"57. Какова периодичность аттестации?","options":["один раз в два года","один раз в год","два раза в год","один раз в пять лет"],"correct":[3]},{"text":"58. Каким нормативным правовым актом установлены правила аттестации сил обеспечения транспортной безопасности?","options":["постановлением Правительства РФ от 22.04.2009г. №354","постановлением Правительства РФ от 04.10.2013г. №880","постановлением Правительства РФ от 26.02.2015г. №172   (Примечание: в новых билетах также фигурирует ПП РФ от 01.06.2023 № 905, если попадется — выбирай его)","постановлением Правительства РФ от 30.07.2014г. № 725"],"correct":[2]},{"text":"59. В каких случаях проводится внеочередная аттестация?","options":["наличия вступившего в законную силу решения суда...","изменения должностных обязанностей аттестованного лица...","изменения требований к знаниям, умениям и навыкам аттестованных лиц...","во всех перечисленных случаях"],"correct":[3]},{"text":"60. Какой документ выдается органом аттестации аттестуемому лицу на основании решения о соответствии его знаний, умений и навыков требованиям законодательства РФ о транспортной безопасности?","options":["свидетельство об аттестации сил обеспечения транспортной безопасности","удостоверение об аттестации аттестуемого лица","свидетельство о допуске аттестуемого лица к выполнению работы...","удостоверение о допуске аттестуемого лица к выполнению работы..."],"correct":[0]},{"text":"61. При обработке персональных данных отдельных категорий лиц, принимаемых на работу... не осуществляется:","options":["проверка документов, указанных в Правилах аттестации сил обеспечения транспортной безопасности...","проверка законности получения документа об образовании","исследование перечня организаций и физических лиц, в отношении которых имеются сведения об их причастности к экстремистской деятельности...","все перечисленное"],"correct":[1]},{"text":"62. Знания, умения и навыки аттестуемого лица считаются не соответствующими требованиям законодательства РФ о транспортной безопасности в случае:","options":["получения при проверке суммарно менее 90 баллов","получения при проверке суммарно менее 85 баллов","получения при проверке суммарно менее 95 баллов","получения при проверке суммарно менее 80 баллов"],"correct":[1]},{"text":"63. В каком нормативном правовом акте закреплены требования к личностным (психофизиологическим) качествам работников подразделений транспортной безопасности, осуществляющих наблюдение...?","options":["Постановление Правительства РФ от 26.02.2015 №172","Приказ Минтранса России от 23.07.2015 №227","Приказ Минтранса России от 29 декабря 2020 N578","Приказ Минтранса России от 21.08.2014 №231"],"correct":[3]},{"text":"64. Работники подразделений транспортной безопасности после прохождения профессиональной подготовки и медицинского осмотра при исполнении должностных обязанностей не имеют право на:","options":["ношение и хранение служебного огнестрельного оружия","ношение и хранение служебного огнестрельного оружия и специальных средств","ношение и хранение, электрошоковых устройств и искровых разрядников","ношение и хранение боевого ручного стрелкового оружия"],"correct":[3]},{"text":"65. Работники подразделений транспортной безопасности обязаны проходить медицинские осмотры:","options":["каждые 6 месяцев","1 раз в год","2 раза в год","1 раз в 2 года"],"correct":[1]},{"text":"66. Работники подразделений транспортной безопасности при применении электрошоковых устройств и искровых разрядников обязаны:","options":["стремиться, чтобы любой вред, причиняемый при этом, был минимальным","обеспечить лицам, получившим телесные повреждения... оказание первой помощи","доложить по подчиненности о каждом случае применения...","верны все утверждения"],"correct":[3]},{"text":"67. Дайте определение понятия «зона транспортной безопасности (ЗТБ)»","options":["Территория ОТИ/ТС, которая считается безопасной при возникновении чрезвычайных ситуация...","Объект транспортной инфраструктуры, его часть (наземная, подземная, воздушная, надводная), транспортное средство, для которых в соответствии с требованиями по обеспечению транспортной безопасности устанавливается особый режим допуска физических лиц, транспортных средств и перемещения грузов, багажа, ручной клади, личных вещей, иных материальных объектов, а также животных","Часть территории объекта транспортной инфраструктуры, транспортное средство, в пределах которых реализованы меры по защите от угроз...","Территория или часть ОТИ, проход в которые осуществляется через контрольно-пропускные пункты..."],"correct":[1]},{"text":"68. Какая из указанных характеристик определяет перевозочный сектор зоны транспортной безопасности ОТИ?","options":["граница частей зоны транспортной безопасности с особым режимом допуска физ. лиц...","граница частей зоны транспортной безопасности, на которой в отношении объектов досмотра проводятся досмотр...","граница частей зоны транспортной безопасности, допуск физ. лиц, в которую осуществляется по перевозочным документам и (или) пропускам установленных видов с учётом предметов и веществ, которые запрещены или ограничены для перемещения","граница частей зоны транспортной безопасности, допуск в которую ограничен для пассажиров..."],"correct":[2]},{"text":"69. Какая из указанных характеристик определяет сектор свободного доступа зоны транспортной безопасности ОТИ?","options":["Границы частей зоны со свободным режимом допуска физ. лиц...","граница частей зоны, на которой в отношении объектов досмотра проводятся досмотр, дополнительный досмотр и повторный досмотр, а выявление у физ. лиц правовых оснований для перемещения не требуется","Граница части зоны, допуск физ. лиц, в которую осуществляется по перевозочным документам...","граница зоны, допуск в которую ограничен для пассажиров..."],"correct":[1]},{"text":"70. Какая из указанных характеристик определяет границу технологического сектора зоны транспортной безопасности ОТИ?","options":["граница частей зоны транспортной безопасности с особым режимом допуска физ. лиц...","граница частей зоны транспортной безопасности, на которой в отношении объектов досмотра проводятся досмотр...","граница частей зоны транспортной безопасности, допуск физ. лиц, в которую осуществляется по перевозочным документам...","граница частей зоны транспортной безопасности, допуск в которую ограничен для пассажиров и осуществляется по пропускам установленных видов для работников и посетителей ОТИ, а также с учётом запрета предметов и веществ, которые запрещены или ограничены для перемещения"],"correct":[3]},{"text":"71. Что относится к технологическим элементам ОТИ, акт незаконного вмешательства в отношении которых приведет к полному или частичному прекращению его функционирования и/или возникновению чрезвычайных ситуаций?","options":["Критические элементы","Особо охраняемая зона","Зона транспортной безопасности","Технологический сектор зоны транспортной безопасности"],"correct":[0]},{"text":"72. Как определено понятие «критический элемент» ОТИ и/или ТС в законодательстве о транспортной безопасности?","options":["Капитальные строения ОТИ, их помещения, конструктивные, технологические и технические элементы","Элемент ОТИ, в отношении порядка функционирования которого компетентными органами...","Строения, помещения, конструктивные, технологические и технические элементы ОТИ или ТС, акт незаконного вмешательства в отношении которых приведет к полному или частичному прекращению их функционирования и/или возникновению чрезвычайных ситуаций","Элемент ОТИ, в отношении которого подразделением транспортной безопасности определена повышенная уязвимость"],"correct":[2]},{"text":"73. Какой организационно-распорядительный документ определяет организацию пропускного и внутри объектового режима на ОТИ?","options":["приказ СТИ о порядке взаимодействия между силами обеспечения транспортной безопасности ОТИ...","положение (инструкция) о пропускном и внутриобъектовом режимах","организационная структура (схема) управления силами обеспечения транспортной безопасности","приказ СТИ о порядоке реагирования сил обеспечения транспортной безопасности на подготовку к совершению АНВ..."],"correct":[1]},{"text":"74. На каких из указанных ТС требования по обеспечению транспортной безопасности обязывают СТИ (перевозчиков) организовать пропускной и внутри объектовый режимы?","options":["суда ледокольного флота, используемые для проводки по морским путям, и суда, в отношении которых применяются правила торгового мореплавания и требования в области охраны судов и портовых средств, установленные международными договорами РФ","суда иностранных перевозчиков","все морские суда","все ответы, указанные выше"],"correct":[0]},{"text":"75. На основании каких документов осуществляется допуск членов экипажа ТС в перевозочный сектор зоны транспортной безопасности ОТИ, с которым ТС осуществляет технологическое взаимодействие?","options":["судовая роль","документы, удостоверяющие личность","судовая роль и документы, удостоверяющие личность","временный пропуск"],"correct":[2]},{"text":"76. На основании каких документов осуществляется допуск пассажиров ТС в перевозочный сектор зоны транспортной безопасности ОТИ, с которым ТС Осуществляет технологическое взаимодействие?","options":["судовая роль","документы, удостоверяющие личность","судовая роль и документы, удостоверяющие личность","проездные, перевозочные и удостоверяющие личность документы"],"correct":[3]},{"text":"77. В каком случае разрешается допуск посетителей на критические элементы ОТИ?","options":["при установлении уровня безопасности № 1","при установлении уровня безопасности № 2","по специальному распоряжению СТИ","допуск посетителей на критические элементы ОТИ запрещён в любом случае"],"correct":[0]},{"text":"78. Как осуществляется допуск физ. лиц, не являющихся членами экипажа ТС или уполномоченными представителями ФОИВ на критические элементы ТС?","options":["по временному пропуску СТИ (перевозчика)","в сопровождении лиц, являющихся членами экипажа ТС","в сопровождении лиц командного состава ТС","в сопровождении лиц из числа сил обеспечения транспортной безопасности ТС"],"correct":[3]},{"text":"79. Что представляет собой пункт управления обеспечением транспортной безопасности?","options":["помещения или участки помещений для управления техническими средствами и силами обеспечения транспортной безопасности","помещения или участки помещений, в которых дислоцируются подразделения ведомственной охраны...","помещения или участки помещений для размещения лиц, ответственных за обеспечение транспортной безопасности...","место нахождения юр. лица, аккредитованного компетентными органами..."],"correct":[0]},{"text":"80. Какое оборудование в числе других технических средств и устройств должно быть на пункте управления обеспечением транспортной безопасности?","options":["переносные средства видеонаблюдения, ручные средства досмотра...","средства управления и связи, обеспечивающие взаимодействие как между собственными силами обеспечения транспортной безопасности, персоналом, так и силами обеспечения транспортной безопасности других ОТИ и (или) ТС, с которыми имеется технологическое взаимодействие","технические системы и средства досмотра","заграждения, решётки, усиленные двери, запорные устройства..."],"correct":[1]},{"text":"81. Для кого из указанных должностных лиц должен быть обеспечен доступ к данным с тех.средств ОТБ, а также передачу таких данных в служебные помещения на ОТИ, предоставленные для выполнения задач в соответствии с установленными полномочиями?","options":["старший дежурных сил обеспечения транспортной безопасности","старший смены охраны пункта управления обеспечением транспортной безопасности","оператор технических средств обеспечения транспортной безопасности","представители уполномоченных подразделений ФОИВ"],"correct":[3]},{"text":"82. Отказ пассажира от досмотра, дополнительного досмотра и повторного досмотра в целях обеспечения транспортной безопасности:","options":["является основанием для расторжения договора перевозки в одностороннем порядке","является основанием для возбуждения уголовного дела","является основанием для административного штрафа","все вышеперечисленное"],"correct":[0]},{"text":"83. Какие виды работ не входят в Перечень работ, непосредственно связанных с обеспечением транспортной безопасности, утвержденный распоряжением Правительства РФ №1653-р?","options":["Аккредитация специализированных организаций в области транспортной безопасности","Аттестация сил обеспечения транспортной безопасности","Осуществление контроля и надзора в области обеспечения транспортной безопасности","Сертификация технических средств обеспечения транспортной безопасности","Техническое обслуживание технических средств обеспечения транспортной безопасности"],"correct":[4]},{"text":"84. Что не относится к перечню работ, непосредственно связанных с обеспечением транспортной безопасности?","options":["Оценка уязвимости объектов транспортной инфраструктуры и транспортных средств","Категорирование объектов транспортной инфраструктуры","Разработка и реализация планов обеспечения транспортной безопасности ОТИ и ТС","Формирование государственной политики в области транспортной безопасности","Формирование и ведение информационных ресурсов единой государственной информационной системы...","Аттестация сил обеспечения транспортной безопасности"],"correct":[3]},{"text":"85. Плановые контрольные (надзорные) мероприятия проводятся:","options":["на основании плана проведения плановых контрольных (надзорных) мероприятий","на основании плана проведения плановых контрольных (надзорных) мероприятий на очередной календарный год","на основании плана проведения плановых контрольных (надзорных) мероприятий на очередной календарный год, согласованного с компетентными органами...","на основании плана проведения плановых контрольных (надзорных) мероприятий на очередной календарный год, согласованного с органами прокуратуры"],"correct":[3]},{"text":"86. Что допускается к использованию при проведении проверок субъектов транспортной инфраструктуры, перевозчиков, застройщиков объектов транспортной инфраструктуры, в том числе плановых и внеплановых выездных проверок?","options":["тест-предметов (предметов, имитирующих оружие, взрывчатые вещества или другие устройства, предметы и вещества, в отношении которых установлены запрет или ограничение на перемещение в зону транспортной безопасности или ее часть) и тест-объектов (лиц, имитирующих нарушителей требований по обеспечению транспортной безопасности)","настоящее оружие","нарушители требований по обеспечению транспортной безопасности","предметы, в отношении которых установлены запрет или ограничение на перемещение в зону транспортной безопасности или ее часть"],"correct":[0]},{"text":"87. Какой статьей Уголовного Кодекса Российской Федерации установлена ответственность за нарушение требований в области транспортной безопасности?","options":["Статья 263 УК РФ","Статья 263.1 УК РФ","Статья 266 УК РФ","Статья 268 УК РФ"],"correct":[1]},{"text":"88. Какой статьей Кодекса Российской Федерации об административных правонарушениях установлена ответственность за нарушение требований в области транспортной безопасности?","options":["7.32.3","11.15.1","20.2.2","Административная ответственность за нарушение требований в области транспортной безопасности не предусмотрена"],"correct":[1]},{"text":"89. Субъекты транспортной инфраструктуры (перевозчик) в отношении транспортных средств дополнительно к требованиям по обеспечения транспортной безопасности... обязаны в том числе (выберите два варианта):","options":["А) Обеспечить защиту транспортного средства от актов незаконного вмешательства силами обеспечения транспортной безопасности транспортного средства, а при осуществлении технологического взаимодействия транспортного средства с объектом транспортной инфраструктуры силами подразделения транспортной безопасности объекта транспортной инфраструктуры (при их наличии).","Б) Выявлять предметы и вещества, которые запрещены или ограничены для перемещения, путем проведения досмотра...","В) Проводить не реже одного раза в 3 часа полный осмотр транспортного средства...","Г) В соответствии с утвержденным планом/паспортом транспортного средства обеспечивать силами обеспечения транспортной безопасности транспортного средства реагирование на подготовку к совершению или совершение актов незаконного вмешательства...","Д) Организовывать обход производственных и служебных помещений транспортного средства...","Е) Проверять соблюдения персоналом ТС установленного на судне противопожарного режима..."],"correct":[0,3]},{"text":"90. Действия, выполнение которых НЕ соответствует обязанностям Субъектов транспортной инфраструктуры (перевозчиков) в отношении транспортных средств в случае объявления уровня безопасности №3:","options":["СТИ (перевозчик) обязан не допускать посетителей на транспортное средство.","СТИ (перевозчик) обязан ограничить доступ на транспортное средство через два поста транспортного средства.","СТИ (перевозчик) обязан увеличить численность работников подразделений транспортной безопасности...","СТИ (перевозчик) обязан принять меры по эвакуации всех физических лиц, находящихся на транспортном средстве, за исключением лица, ответственного за обеспечение транспортной безопасности на ТС.","СТИ (перевозчик) обязан выявлять нарушителей, а также подготовку к совершению или совершение актов незаконного вмешательства...","СТИ (перевозчик) обязан прекратить посадку и (или) высадку пассажиров..."],"correct":[1,3]},{"text":"91. Укажите оптимальное распределение работников сил обеспечения транспортной безопасности (указанных цифрами на схеме КПП) по видам деятельности:","options":["Работник, проводящий дополнительный досмотр - 3; работник, проводящий досмотр с помощью МИС- 4.","Работник, проводящий досмотр с помощью РТУ - 4; работник, проводящий наблюдение и (или) собеседование – 6.","Работник, проводящий досмотр с помощью РТУ- 5; работник, проводящий наблюдение и (или) собеседование- 1.","Работник, проводящий досмотр с помощью РТУ - 5; работник, проводящий дополнительный досмотр - 4."],"correct":[2]},{"text":"92. Определите наиболее оптимальный вариант расстановки вахты при Уровне Безопасности № 3, исходя из имеющихся сил ОТБ, приведенных на схеме:","options":["А) Вахтенный у трапа; Патруль транспортной безопасности.","Б) Вахтенный помощник в рулевой рубке, ведет наблюдение в круговом секторе (не менее 20 минут в 2 часа).","В) Вахтенный наблюдатель, постоянно находится в рулевой рубке и ведет наблюдение в круговом секторе.","Г) Вахтенный механик в МО, постоянно находится в ЦПУ."],"correct":[0,2]},{"text":"93. Какое определение установлено для понятия «категорирование объектов транспортной инфраструктуры»?","options":["присвоение объектам транспортной инфраструктуры и транспортных средств условного индекса для характеристики степени их уязвимости в отношении угроз транспортной безопасности","отнесение объектов транспортной инфраструктуры к определенным категориям с учетом степени угрозы совершения акта незаконного вмешательства и его возможных последствий","количественные показатели аварийности и ущерба по видам транспортной деятельности, а также определение степени угроз совершения актов незаконного вмешательства в отношении объектов транспортной инфраструктуры и транспортных средств","определение категорий компетентным органом в области обеспечения транспортной безопасности для объектов транспортной инфраструктуры и транспортных средств с учетом степени потенциальной угрозы"],"correct":[1]},{"text":"94. Какие из указанных сведений, согласно постановления Правительства РФ от 14.11.2022 № 2051, относятся к информации ограниченного доступа?","options":["сведения о результатах проведенной оценки уязвимости ОТИ","сведения о результатах проведенной оценки уязвимости судов ледокольного флота, используемых для проводки по морским путям","сведения о результатах проведенной оценки уязвимости объектов транспортной инфраструктуры, судов ледокольного флота, используемых для проводки по морским путям, судов, в отношении которых применяются правила торгового мореплавания и требования в области охраны судов и портовых средств, установленные международными договорами Российской Федерации, а также со сведениями, содержащимися в планах и паспортах обеспечения транспортной безопасности объектов транспортной инфраструктуры и (или) транспортных средств","информационные ресурсы ЕГИС ОТБ"],"correct":[2]},{"text":"95. С какой периодичностью проводится проверка носителей информации ограниченного доступа ответственными за их учёт и хранение?","options":["не реже 2-х раз в год","не реже 1-го раза в год","не реже 1-го раза в 2 года","каждый раз при поступлении или уничтожении более 5 документов ограниченного доступа"],"correct":[1]},{"text":"96. В отношении, каких производственных объектов при осуществлении федерального надзора в области транспортной безопасности проводится инспекционный визит?","options":["транспортные средства, осуществляющие международные перевозки","транспортные средства иностранных перевозчиков","транспортные средства, в отношении которых применяются правила торгового мореплавания и требования в области охраны судов и портовых средств, установленные международными договорами РФ","объекты транспортной инфраструктуры"],"correct":[2]},{"text":"97. Каков максимальный срок проведения рейдового осмотра?","options":["5 рабочих дней","10 рабочих дней","5 календарных дней","10 календарных дней"],"correct":[1]},{"text":"98. Планы транспортной безопасности должны содержать:","options":["меры, реализуемые субъектами транспортной инфраструктуры по исполнению требований по обеспечению транспортной безопасности, предусмотренные № 16-ФЗ \"О транспортной безопасности\", в отношении объекта транспортной инфраструктуры и судна соответственно, а также этапы и сроки их реализации","меры и процедуры, предусмотренные Международным кодексом по охране судов и портовых средств (Кодекс ОСПС), в отношении объекта транспортной инфраструктуры и судна соответственно, а также этапы и сроки их реализации","меры и процедуры, предусмотренные Кодексом торгового мореплавания Российской Федерации, в отношении объекта транспортной инфраструктуры и судна соответственно, а также этапы и сроки их реализации","меры и процедуры, предусмотренные Международным кодексом по управлению безопасностью (МКУБ) и Международным кодексом по охране судов и портовых средств (Кодекс ОСПС), в отношении объекта транспортной инфраструктуры и судна соответственно, а также этапы и сроки их реализации"],"correct":[0]},{"text":"99. Что из перечисленного является основаниями для нахождения физического лица на территории сектора свободного доступа зоны транспортной безопасности?","options":["Отсутствие у физического лица включенных в Перечни предметов и веществ, запрещенных или ограниченных для перемещения","Выполнение Требований по соблюдению транспортной безопасности","Наличие у физического лица документа, удостоверяющего личность","Наличие у физического лица перевозочного (проездного) документа и документа, удостоверяющего личность","Наличие у физического лица пропуска установленной формы"],"correct":[1]},{"text":"100. Какие действия следует выполнить в отношении носителей информации ограниченного доступа в случае утраты СТИ прав собственности (использования их на ином законном основании) на ОТИ и ТС, или в случае ликвидации специализированной организации?","options":["уничтожение установленным порядком","передача другим ОТИ и ТС, специализированной организации установленным порядком","передача в Росморречфлот","передача в ФСБ России"],"correct":[1]},{"text":"101. Какие организационно-распорядительные документы являются приложением к плану обеспечения транспортной безопасности объектов транспортной инфраструктуры и транспортных средств? Выберите не верный вариант ответ.","options":["положение (инструкция) о пропускном и внутриобъектовом режимах на объекте транспортной инфраструктуры/транспортном средстве","порядок реагирования сил обеспечения транспортной безопасности на подготовку к совершению акта незаконного вмешательства или совершение акта незаконного вмешательства","перечень штатных должностей работников субъекта транспортной инфраструктуры, непосредственно связанных с обеспечением транспортной безопасности объекта транспортной инфраструктуры/транспортного средства","правила использования служебных собак подразделениями транспортной безопасности при выявлении оружия, взрывчатых веществ или других устройств, предметов и веществ, в отношении которых установлен запрет или ограничение на перемещения в зону транспортной безопасности объекта транспортной инфраструктуры/транспортного средства"],"correct":[3]},{"text":"102. Укажите принципы обеспечения транспортной безопасности:","options":["Законность, соблюдение баланса интересов личности и государства, взаимодействие субъектов транспортной инфраструктуры и правоохранительных органов.","Законность, соблюдение баланса интересов личности, общества и государства, взаимная ответственность личности, общества и государства в области обеспечения транспортной безопасности, непрерывность, интеграция в международные системы безопасности, взаимодействие субъектов транспортной инфраструктуры, органов государственной власти и органов местного самоуправления.","Непрерывность, финансирование за счет средств субъектов транспортной инфраструктуры, закрытость информации о мерах безопасности."],"correct":[1]},{"text":"103. Чем в первую очередь должны руководствоваться силы обеспечения транспортной безопасности объектов транспортной инфраструктуры и (или) судов ледокольного флота, используемых для проводки по морским путям, судов, в отношении которых применяются правила торгового мореплавания... выбирая порядок действий при реагировании на угрозы совершения актов незаконного вмешательства?","options":["Прямыми указаниями сотрудников правоохранительных органов.","Планами обеспечения транспортной безопасности (схемами действий и должностными инструкциями, составленными в соответствии с указанными планами).","Собственными тактическими решениями, опирающимися на здравый смысл."],"correct":[1]},{"text":"104. Чем в первую очередь должны руководствоваться силы обеспечения транспортной безопасности транспортного средства, не подлежащего категорированию, выбирая порядок действий при реагировании на угрозы совершения актов незаконного вмешательства?","options":["Планами обеспечения транспортной безопасности транспортного средства.","Паспортом обеспечения транспортной безопасности транспортного средства.","Указаниями капитана судна."],"correct":[1]},{"text":"105. Кем, в соответствии с Федеральным законом от 09.02.2004 г. № 16-ФЗ «О транспортной безопасности», утверждается паспорт обеспечения транспортной безопасности ОТИ и ТС, не подлежащих категорированию?","options":["Компетентным органом в области обеспечения транспортной безопасности.","Паспорт обеспечения транспортной безопасности утверждается субъектом транспортной инфраструктуры.","Федеральной службой по надзору в сфере транспорта."],"correct":[1]},{"text":"106. С какого момента в соответствии с законодательством о транспортной безопасности реализуются меры по защите от актов незаконного вмешательства в отношении ТС, используемых для перевозки грузов повышенной опасности и (или) опасных грузов?","options":["В течение 1 месяца с момента принятия груза к перевозке.","В течение всего времени с момента утверждения плана или паспорта обеспечения транспортной безопасности ТС.","С момента принятия груза к перевозке и до его выдачи грузополучателю."],"correct":[1]},{"text":"107. Чем в первую очередь должны руководствоваться силы обеспечения транспортной безопасности морского терминала при реагировании на угрозы совершения актов незаконного вмешательства?","options":["Положениями главы XI-2 СОЛАС и МК ОСПС.","Планами охраны морских судов, находящихся в порту.","Планом обеспечения транспортной безопасности ОТИ, являющимся планом охраны соответствующего портового средства."],"correct":[2]},{"text":"108. Субъекты транспортной инфраструктуры в целях обеспечения транспортной безопасности ОТИ обязаны проводить... учения и тренировки в целях оценки эффективности и полноты реализации плана... с периодичностью не реже:","options":["одного раза в месяц для объектов транспортной инфраструктуры III и IV категорий и не менее 2 раз в месяц для объектов транспортной инфраструктуры I и II категорий.","одного раза в год для объектов транспортной инфраструктуры III и IV категорий и не менее 2 раз в год для объектов транспортной инфраструктуры I и II категорий.","два раза в год для объектов транспортной инфраструктуры III и IV категорий и не менее 4 раз в год для объектов транспортной инфраструктуры I и II категорий."],"correct":[1]},{"text":"109. Субъекты транспортной инфраструктуры в целях обеспечения транспортной безопасности ОТИ обязаны реализовать предусмотренные планом... дополнительные меры при изменении уровня безопасности в сроки, не превышающие:","options":["Одного часа с момента получения информации о готовящемся акте незаконного вмешательства.","4 часов с момента получения решения об изменении степени угрозы совершения акта незаконного вмешательства или информации об объявлении (установлении) уровня охраны в отношении объекта транспортной инфраструктуры.","2 часов с момента получения решения об изменении степени угрозы."],"correct":[1]},{"text":"110. Что является основанием для проведения Ространснадзором плановой проверки?","options":["Истечение одного года со дня государственной регистрации субъекта транспортной инфраструктуры, перевозчика, застройщика ОТИ, или со дня проведения последней плановой проверки.","Истечение трех лет со дня государственной регистрации субъекта транспортной инфраструктуры, перевозчика, застройщика ОТИ.","Поступление в органы государственного контроля информации о фактах нарушений."],"correct":[0]},{"text":"111. Проведение каких дополнительных мероприятий предусмотрено при поступлении в органы государственного контроля (надзора) информации о фактах возникновения угрозы совершения акта незаконного вмешательства в деятельность транспортного комплекса?","options":["Проведение документарной проверки.","Проведение внеплановой выездной проверки с использованием тест-предметов и тест-объектов.","Незамедлительное информирование руководителя территориального органа."],"correct":[1]},{"text":"112. Выберите полный перечень субъектов, в отношении которых может проводиться проверка с использованием тест-предметов и тест-объектов органами государственного контроля (надзора)?","options":["Застройщиков объектов транспортной инфраструктуры.","Субъектов транспортной инфраструктуры и перевозчиков.","Субъектов транспортной инфраструктуры, перевозчиков и застройщиков объектов транспортной инфраструктуры."],"correct":[2]},{"text":"113. Какие возможные наказания установлены Уголовным кодексом Российской Федерации для случаев неисполнения требований по соблюдению транспортной безопасности... если это деяние повлекло по неосторожности причинение тяжкого вреда здоровью человека либо причинение крупного ущерба?","options":["Штраф в размере до пятидесяти тысяч рублей или в размере заработной платы за период до шести месяцев.","Штраф в размере до восьмидесяти тысяч рублей или в размере заработной платы или иного дохода осужденного за период до шести месяцев либо ограничение свободы на срок до одного года.","Штраф в размере от пяти тысяч до десяти тысяч рублей."],"correct":[1]},{"text":"114. Какие действия персонала, сил обеспечения транспортной безопасности при тревоге «угроза захвата» на объектах транспортной инфраструктуры не являются обязательными?","options":["Оснащение ОТИ дополнительными техническими средствами ОТБ.","Проверка достоверности сообщения.","Введение ограничений на перемещение ТС и персонала по территории ОТИ."],"correct":[0]},{"text":"115. В соответствии с Перечнем потенциальных угроз... Угроза захвата – это:","options":["возможность захвата критического элемента ОТИ и/или ТС, установления над ними контроля с применением специальных средств, оружия.","возможность захвата ОТИ и/или ТС, установления над ними контроля силой или угрозой применения силы, или путем любой другой формы запугивания.","возможность захвата в качестве заложников лиц из числа персонала ОТИ и/или ТС, пассажиров."],"correct":[1]},{"text":"116. Из перечня нижеприведенных методов обеспечения безопасности выберите те, которые согласно требованиям по обеспечению транспортной безопасности могут быть использованы при реализации системы мер по защите ОТИ/ТС от актов незаконного вмешательства? (1. Видеонаблюдение... 2. Сверка документов... 3. Досмотр... 4. Патрульный обход...)","options":["Только методы, перечисленные в пунктах 2 и 3.","Все методы, перечисленные в пунктах 1, 2, 3, 4.","Сертификация технических средств обеспечения транспортной безопасности."],"correct":[1]},{"text":"117. Из перечисленных ниже выберите исчерпывающий перечень технических средств, предназначенных для использования на ОТИ и ТС в целях обеспечения транспортной безопасности.","options":["Системы контроля доступа, досмотра, видеонаблюдения... предназначенные для использования правоохранительными органами.","Системы и средства сигнализации, контроля доступа, досмотра, видеонаблюдения, аудио- и видеозаписи, связи, оповещения, сбора, обработки, приема и передачи информации, предназначенные для использования на объектах транспортной инфраструктуры и транспортных средствах в целях обеспечения транспортной безопасности.","Системы и средства пожарной сигнализации, контроля доступа, досмотра."],"correct":[1]},{"text":"118. Укажите исчерпывающий круг лиц, на которых распространяются Требования по соблюдению транспортной безопасности, утвержденные постановлением Правительства от 15 ноября 2014 года N 1208?","options":["На все юридические и физические лица, находящиеся на объектах транспортной инфраструктуры.","На физических лиц, следующих либо находящихся на объектах транспортной инфраструктуры или транспортных средствах различных видов транспорта.","На физических лиц, находящихся только в зоне транспортной безопасности."],"correct":[1]},{"text":"119. Выберите понятие, которое соответствует определению «обстановка, сложившаяся на определенной территории или акватории в результате аварии, опасного природного явления, катастрофы, стихийного или иного бедствия...»:","options":["Акт незаконного вмешательства.","Экстремальное событие.","Чрезвычайная ситуация.","Нештатная ситуация."],"correct":[2]},{"text":"120. Какие виды деятельности не входят в перечень работ, непосредственно связанных с обеспечением транспортной безопасности:","options":["Аккредитация специализированных организаций в области транспортной безопасности.","Разработка и реализация планов обеспечения транспортной безопасности.","Осуществление контроля и надзора в области обеспечения транспортной безопасности.","Подготовка сил обеспечения транспортной безопасности."],"correct":[3]},{"text":"121. Проверка уровня физической подготовки назначается для аттестуемого лица, осуществляющего (планирующего осуществлять) деятельность в качестве работника подразделения транспортной безопасности:","options":["включенного в состав группы быстрого реагирования","осуществляющего досмотр, дополнительный досмотр, повторный досмотр","осуществляющего наблюдения и (или) собеседование","все из указанного"],"correct":[0]},{"text":"122. Каков срок проведения выездной проверки при осуществлении фед. надзора в области транспортной безопасности в отношении контролируемого лица, если оно не является малым предприятием или микропредприятием?","options":["5 рабочих дней","10 рабочих дней","5 календарных дней","10 календарных дней"],"correct":[1]},{"text":"123. Исходя из приведенной ниже схемы вариантов организации обеспечения транспортной безопасности определите наиболее оптимальную схему расстановки вахты при Уровне Безопасности №1 (выберите 2 варианта ответа):","options":["А) Вахтенный у трапа","Б) Патруль транспортной безопасности","В) Вахтенный наблюдатель, постоянно находится в рулевой рубке"],"correct":[0,1]},{"text":"124. Исходя из приведенной ниже схемы вариантов организации обеспечения транспортной безопасности определите наиболее оптимальную схему расстановки вахты при Уровне Безопасности № 2 (выберите 2 варианта ответа):","options":["А) Вахтенный у трапа; Патруль транспортной безопасности","Б) Вахтенный помощник в рулевой рубке, ведет наблюдение в круговом секторе (не менее 20 минут в 2 часа)","В) Вахтенный наблюдатель, постоянно находится в рулевой рубке и ведет наблюдение в круговом секторе"],"correct":[0,1]},{"text":"125. Какой (какие) из объектов показанных на схеме объекта транспортной инфраструктуры может быть в первую очередь отнесен к критическим элементам... (выберите 2 правильных ответа):","options":["3. Трансформаторная подстанция","5. Топливные емкости большого объема"],"correct":[0,1]},{"text":"126. Определите название устройств, изображенных на иллюстрациях досмотрового оборудования (выберите 2 правильных ответа):","options":["Б) 1.- видеоэндоскоп, 2.- досмотровое зеркало, 3.- интроскоп","Г) 4.- стационарный металлодетектор, 5.- ручной металлодетектор","А) 1.- газоанализатор, 2.- досмотровое зеркало","В) 3.- рентгенотелевизионная установка, 4.- рамка контроля"],"correct":[0,1]},{"text":"127. Из приведенных ниже формулировок выберите два варианта для наиболее точного решения задачи: определите - реализация каких видов угроз наиболее вероятна в отношении указанных на изображении критических элементов судна. (выберите 2 правильных ответа):","options":["1. Критические элементы 3 и 2 — угроза захвата КЭ, критический элемент 3 — угроза поражения опасными веществами.","2. Критические элементы 1 и 2 — угроза взрыва КЭ."],"correct":[0,1]},{"text":"128. На рисунке представлена схема объекта транспортной инфраструктуры с обозначенными границами зоны транспортной безопасности и ее секторов. Определите, какие из перечисленных ниже утверждений правильно сопоставлены с обозначенными на схеме секторами (выберите 2 правильных ответа):","options":["Б) допуск физических лиц в которые осуществляется по перевозочным документам и (или) пропускам установленных видов с учетом предметов и веществ, которые запрещены или ограничены для перемещения – 3.","Г) допуск ограничен для пассажиров и осуществляется по пропускам установленных видов для работников и посетителей объекта транспортной инфраструктуры, а также с учетом запрета предметов и веществ, которые запрещены или ограничены для перемещения – 1.","А) граница частей зоны со свободным режимом допуска – 2."],"correct":[0,1]},{"text":"129. Определите какие из указанных на схеме судна помещений относятся к критическим элементам транспортного средства (выберите 2 правильных ответа):","options":["Машинное отделение","Рулевая рубка","Грузовые трюмы","Форпик"],"correct":[0,1]},{"text":"130. Согласно Федеральному закону от 9 февраля 2007 г. № 16-ФЗ «О транспортной безопасности» уровень безопасности это:","options":["Степень защиты и здоровья граждан от чрезвычайных ситуаций природного и техногенного характера","совокупность технико-технологических, социальных и организационно-управленческих факторов, воздействующих как положительно, так и отрицательно на транспортный комплекс","степень защищенности транспортного комплекса, соответствующая степени угрозы совершения акта незаконного вмешательства","степень защищенности от возникновения чрезвычайных ситуаций и совершения акта незаконного вмешательства"],"correct":[2]}]
</script>

<script>
(function(){
  "use strict";

  var QUESTIONS = JSON.parse(document.getElementById('questions-data').textContent);

  var screens = {
    menu: document.getElementById('screen-menu'),
    quiz: document.getElementById('screen-quiz'),
    result: document.getElementById('screen-result')
  };

  function showScreen(name){
    Object.keys(screens).forEach(function(k){
      screens[k].classList.toggle('active', k === name);
    });
  }

  document.getElementById('q-count').textContent = QUESTIONS.length;

  // ---------- shuffle helpers (аналог shuffle_questions из Python) ----------
  function shuffleArray(arr){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function shuffleQuestions(qs){
    var shuffled = qs.map(function(q){
      var indexed = q.options.map(function(opt, idx){ return {idx: idx, opt: opt}; });
      indexed = shuffleArray(indexed);

      var newOptions = indexed.map(function(p){ return p.opt; });
      var oldToNew = {};
      indexed.forEach(function(p, newIdx){ oldToNew[p.idx] = newIdx; });

      var newCorrect = q.correct.map(function(c){ return oldToNew[c]; }).sort(function(a,b){ return a-b; });

      return { text: q.text, options: newOptions, correct: newCorrect };
    });
    return shuffleArray(shuffled);
  }

  // ---------- state ----------
  var mode = null;
  var sessionQs = [];
  var i = 0;
  var selected = [];
  var locked = false;
  var answersCorrect = [];
  var wrongList = [];

  function start(m){
    mode = m;
    sessionQs = shuffleQuestions(QUESTIONS);
    i = 0;
    answersCorrect = [];
    wrongList = [];
    showScreen('quiz');
    showQuestion();
  }

  function updateHeaderProgress(){
    var el = document.getElementById('header-progress');
    if (mode && i < sessionQs.length){
      el.textContent = (i+1) + ' / ' + sessionQs.length;
    } else {
      el.textContent = '';
    }
  }

  function showQuestion(){
    if (i >= sessionQs.length){
      finish();
      return;
    }

    selected = [];
    locked = false;

    var q = sessionQs[i];
    document.getElementById('q-number').textContent = 'Вопрос ' + (i+1) + ' из ' + sessionQs.length;
    document.getElementById('q-text').textContent = stripNumberPrefix(q.text);

    var multiHint = document.getElementById('multi-hint');
    multiHint.style.display = (q.correct.length > 1 && mode === 'test') ? 'block' : 'none';

    var fill = document.getElementById('progress-fill');
    fill.style.width = Math.round((i / sessionQs.length) * 100) + '%';

    var wrap = document.getElementById('options');
    wrap.innerHTML = '';

    q.options.forEach(function(opt, idx){
      var div = document.createElement('button');
      div.type = 'button';
      div.className = 'option';
      div.innerHTML = '<span class="bullet"></span><span>' + escapeHtml(opt) + '</span>';
      div.addEventListener('click', function(){ select(idx, div, q); });
      wrap.appendChild(div);
    });

    var nextBtn = document.getElementById('btn-next');
    nextBtn.textContent = mode === 'train' ? 'Далее →' : 'Ответить';
    nextBtn.disabled = false;
    nextBtn.onclick = mode === 'train' ? next : submitTest;

    updateHeaderProgress();
  }

  function stripNumberPrefix(text){
    return text.replace(/^\d+[\.\)]\s+/, '');
  }

  function escapeHtml(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function select(idx, el, q){
    if (mode === 'train'){
      var allOptions = document.querySelectorAll('#options .option');
      if (q.correct.indexOf(idx) === -1){
        el.classList.add('incorrect');
      }
      q.correct.forEach(function(c){
        allOptions[c].classList.add('correct');
      });
      return;
    }

    // test mode
    var pos = selected.indexOf(idx);
    if (pos === -1){
      selected.push(idx);
      el.classList.add('selected');
    } else {
      selected.splice(pos, 1);
      el.classList.remove('selected');
    }
  }

  function next(){
    i++;
    showQuestion();
  }

  function submitTest(){
    var q = sessionQs[i];
    var sortedSelected = selected.slice().sort(function(a,b){return a-b;});
    var sortedCorrect = q.correct.slice().sort(function(a,b){return a-b;});
    var isCorrect = sortedSelected.length === sortedCorrect.length &&
      sortedSelected.every(function(v, idx){ return v === sortedCorrect[idx]; });

    if (isCorrect){
      answersCorrect.push(true);
    } else {
      answersCorrect.push(false);
      wrongList.push({
        index: i,
        text: stripNumberPrefix(q.text),
        options: q.options,
        correct: q.correct,
        selected: selected.slice()
      });
    }

    i++;
    showQuestion();
  }

  function finish(){
    showScreen('result');
    updateHeaderProgress();

    var total = sessionQs.length;
    var correctCount = answersCorrect.filter(Boolean).length;
    var percent = total > 0 ? Math.round((correctCount / total) * 1000) / 10 : 0;

    document.getElementById('res-correct').textContent = correctCount;
    document.getElementById('res-total').textContent = total;

    var badge = document.getElementById('res-percent-badge');
    badge.textContent = percent + '%';
    badge.className = 'result-percent ' + (percent >= 70 ? 'pass' : 'fail');

    var reviewWrap = document.getElementById('review-wrap');
    reviewWrap.innerHTML = '';

    if (mode === 'test' && wrongList.length > 0){
      var title = document.createElement('div');
      title.className = 'review-title';
      title.textContent = 'Разбор ошибок (' + wrongList.length + ')';
      reviewWrap.appendChild(title);

      wrongList.forEach(function(w){
        var item = document.createElement('div');
        item.className = 'review-item';

        var qLabel = document.createElement('div');
        qLabel.className = 'review-q';
        qLabel.textContent = 'Вопрос ' + (w.index + 1);
        item.appendChild(qLabel);

        var qText = document.createElement('div');
        qText.className = 'review-text';
        qText.textContent = w.text;
        item.appendChild(qText);

        w.options.forEach(function(opt, j){
          var row = document.createElement('div');
          var isCorrectOpt = w.correct.indexOf(j) !== -1;
          var wasSelected = w.selected.indexOf(j) !== -1;

          if (isCorrectOpt){
            row.className = 'review-opt is-correct';
            row.innerHTML = '<span class="tag">✔</span><span>' + escapeHtml(opt) + '</span>';
          } else if (wasSelected){
            row.className = 'review-opt is-wrong';
            row.innerHTML = '<span class="tag">✕</span><span>' + escapeHtml(opt) + '</span>';
          } else {
            row.className = 'review-opt';
            row.style.color = 'var(--muted)';
            row.innerHTML = '<span class="tag"></span><span>' + escapeHtml(opt) + '</span>';
          }
          item.appendChild(row);
        });

        reviewWrap.appendChild(item);
      });
    } else if (mode === 'test' && wrongList.length === 0){
      var ok = document.createElement('div');
      ok.className = 'no-errors';
      ok.textContent = 'Все ответы верны. Ошибок нет.';
      reviewWrap.appendChild(ok);
    }
  }

  function toMenu(){
    mode = null;
    showScreen('menu');
    updateHeaderProgress();
  }

  document.getElementById('btn-train').addEventListener('click', function(){ start('train'); });
  document.getElementById('btn-test').addEventListener('click', function(){ start('test'); });
  document.getElementById('btn-to-menu').addEventListener('click', toMenu);

})();
</script>

</body>
</html>
