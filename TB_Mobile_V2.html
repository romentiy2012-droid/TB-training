<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ТБ Тренажёр</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .screen { display: none; }
        .screen.active { display: block; }
        
        h1 { text-align: center; color: #2c3e50; font-size: 24px; margin-top: 10vh; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 40px; font-weight: bold; }
        
        .btn { display: block; width: 100%; padding: 18px 15px; margin-bottom: 12px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.2s; text-align: left; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-menu { text-align: center; font-size: 18px; color: #fff; font-weight: bold; padding: 20px; }
        .btn-train { background: #3498db; }
        .btn-test { background: #e74c3c; }
        
        .btn.selected { border: 2px solid #2c3e50; background: #e2e8f0; }
        .btn.correct { background: #d4edda !important; border: 2px solid #28a745; }
        .btn.wrong { background: #f8d7da !important; border: 2px solid #dc3545; }
        
        .btn-action { background: #2ecc71; color: #fff; text-align: center; font-weight: bold; display: none; margin-top: 20px; font-size: 18px; }
        
        .progress { font-size: 14px; color: #7f8c8d; margin-bottom: 15px; font-weight: bold; }
        .question-text { font-size: 18px; font-weight: bold; margin-bottom: 25px; line-height: 1.4; color: #2c3e50; }
        
        .result-title { text-align: center; font-size: 22px; color: #2c3e50; margin-bottom: 10px; }
        .result-score { text-align: center; font-size: 28px; font-weight: bold; color: #27ae60; margin-bottom: 30px; }
        
        .result-item { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .res-opt { margin: 8px 0; padding: 10px; border-radius: 6px; font-size: 15px; }
        .res-correct { background: #d4edda; border-left: 4px solid #28a745; }
        .res-wrong { background: #f8d7da; border-left: 4px solid #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen" class="screen active">
        <h1>Транспортная Безопасность</h1>
        <div class="subtitle" id="q-count">Распаковка данных...</div>
        
        <button class="btn btn-menu btn-train" id="btn-train" onclick="startApp('train')" disabled>ОБУЧЕНИЕ<br><span style="font-size: 14px; font-weight: normal;">Сразу показывает ошибки</span></button>
        <button class="btn btn-menu btn-test" id="btn-test" onclick="startApp('test')" disabled>ЭКЗАМЕН<br><span style="font-size: 14px; font-weight: normal;">Как на реальной сдаче</span></button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress" id="progress">1/92</div>
        <div class="question-text" id="question-text">Текст вопроса</div>
        <div id="options-container"></div>
        <button class="btn btn-action" id="action-btn" onclick="handleAction()">ДАЛЕЕ →</button>
    </div>

    <div id="result-screen" class="screen">
        <div class="result-title">Тестирование завершено</div>
        <div class="result-score" id="result-score">0/0 (0%)</div>
        <button class="btn btn-menu btn-train" style="margin-bottom: 20px;" onclick="showMenu()">Вернуться в меню</button>
        <div id="mistakes-container"></div>
    </div>
</div>

        function parseBaseTxt(raw) {
            const lines = raw.split(/\r?\n/); 
            const qPattern = /^\d+[\.\)]\s+/;
            let questions = [];
            let currentQ = null;
            let options = [];
            let correct = [];

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;

                if (qPattern.test(line)) {
                    if (currentQ && options.length > 0) {
                        questions.push({ text: currentQ, options: options, correct: correct.length > 0 ? correct : [0] });
                    }
                    currentQ = line;
                    options = [];
                    correct = [];
                    continue;
                }

                if (currentQ) {
                    let isCorrect = line.startsWith('+');
                    let text = line.replace(/^\+/, '').trim();
                    options.push(text);
                    if (isCorrect) correct.push(options.length - 1);
                }
            }
            if (currentQ && options.length > 0) {
                questions.push({ text: currentQ, options: options, correct: correct.length > 0 ? correct : [0] });
            }
            return questions;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                let temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
        }

        function shuffleQuestions(qs) {
            let shuffled = [];
            for (let k = 0; k < qs.length; k++) {
                let q = qs[k];
                let indexedOptions = [];
                for (let i = 0; i < q.options.length; i++) {
                    indexedOptions.push({ opt: q.options[i], oldIdx: i });
                }
                shuffleArray(indexedOptions);
                
                let newOptions = [];
                let oldToNew = {};
                for (let i = 0; i < indexedOptions.length; i++) {
                    newOptions.push(indexedOptions[i].opt);
                    oldToNew[indexedOptions[i].oldIdx] = i;
                }
                
                let newCorrect = [];
                for (let i = 0; i < q.correct.length; i++) {
                    newCorrect.push(oldToNew[q.correct[i]]);
                }
                newCorrect.sort();
                
                shuffled.push({ text: q.text, options: newOptions, correct: newCorrect });
            }
            shuffleArray(shuffled);
            return shuffled;
        }

                screens[i].classList.remove('active');
            }
            document.getElementById(id).classList.add('active');
        };

        window.showMenu = function() { switchScreen('menu-screen'); };

        window.startApp = function(selectedMode) {
            mode = selectedMode;
            sessionQs = shuffleQuestions(allQuestions);
            currentIndex = 0;
            score = 0;
            wrongAnswers = [];
            switchScreen('quiz-screen');
            renderQuestion();
        };

        function renderQuestion() {
            if (currentIndex >= sessionQs.length) {
                showResults();
                return;
            }

            selectedSet.clear();
            isLocked = false;
            
            let q = sessionQs[currentIndex];
            document.getElementById('progress').innerText = `Вопрос ${currentIndex + 1} из ${sessionQs.length}`;
            document.getElementById('question-text').innerText = q.text;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            for (let idx = 0; idx < q.options.length; idx++) {
                let opt = q.options[idx];
                let btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = opt;
                btn.onclick = function() { handleSelect(idx, btn); };
                container.appendChild(btn);
            }

            let actionBtn = document.getElementById('action-btn');
            actionBtn.style.display = 'none';
            if (mode === 'test') {
                actionBtn.innerText = 'ОТВЕТИТЬ';
            } else {
                actionBtn.innerText = 'ДАЛЕЕ →';
            }
        }

        window.handleSelect = function(idx, btnElem) {
            if (isLocked) return;
            let q = sessionQs[currentIndex];

            if (mode === 'train') {
                isLocked = true;
                let btns = document.getElementById('options-container').children;
                
                let isCorrect = false;
                for (let c = 0; c < q.correct.length; c++) {
                    if (q.correct[c] === idx) isCorrect = true;
                }

                if (isCorrect) {
                    btnElem.classList.add('correct');
                } else {
                    btnElem.classList.add('wrong');
                }

                for (let c = 0; c < q.correct.length; c++) {
                    btns[q.correct[c]].classList.add('correct');
                }

                document.getElementById('action-btn').style.display = 'block';
            } else if (mode === 'test') {
                if (selectedSet.has(idx)) {
                    selectedSet.delete(idx);
                    btnElem.classList.remove('selected');
                } else {
                    selectedSet.add(idx);
                    btnElem.classList.add('selected');
                }
                
                if (selectedSet.size > 0) {
                    document.getElementById('action-btn').style.display = 'block';
                } else {
                    document.getElementById('action-btn').style.display = 'none';
                }
            }
        };

        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        }

        window.handleAction = function() {
            if (mode === 'test') {
                let q = sessionQs[currentIndex];
                let selectedArr = [];
                selectedSet.forEach(function(val) { selectedArr.push(val); });
                selectedArr.sort();
                
                if (arraysEqual(selectedArr, q.correct)) {
                    score++;
                } else {
                    wrongAnswers.push({ q: q, selected: selectedArr });
                }
            }
            currentIndex++;
            renderQuestion();
        };

        function showResults() {
            switchScreen('result-screen');
            let percent = ((score / sessionQs.length) * 100).toFixed(1);
            document.getElementById('result-score').innerText = `${score} / ${sessionQs.length} (${percent}%)`;
            
            let mistakesContainer = document.getElementById('mistakes-container');
            mistakesContainer.innerHTML = '';

            if (wrongAnswers.length > 0) {
                let h3 = document.createElement('h3');
                h3.innerText = 'Работа над ошибками:';
                h3.style.color = '#2c3e50';
                mistakesContainer.appendChild(h3);

                for (let i = 0; i < wrongAnswers.length; i++) {
                    let err = wrongAnswers[i];
                    let html = `<div class="result-item"><div style="font-weight:bold; margin-bottom:10px; color:#c0392b;">❌ Ошибка ${i + 1}</div><div style="font-weight:bold; margin-bottom:15px;">${err.q.text}</div>`;
                    
                    for (let j = 0; j < err.q.options.length; j++) {
                        let opt = err.q.options[j];
                        
                        let isCorrect = false;
                        for (let c = 0; c < err.q.correct.length; c++) {
                            if (err.q.correct[c] === j) isCorrect = true;
                        }
                        
                        let isSelected = false;
                        for (let s = 0; s < err.selected.length; s++) {
                            if (err.selected[s] === j) isSelected = true;
                        }
                        
                        if (isCorrect) {
                            html += `<div class="res-opt res-correct">${opt} <br><b>(✔ Правильный ответ)</b></div>`;
                        } else if (isSelected && !isCorrect) {
                            html += `<div class="res-opt res-wrong">${opt} <br><b>(✖ Твой выбор)</b></div>`;
                        } else {
                            html += `<div class="res-opt" style="color: #7f8c8d;">${opt}</div>`;
                        }
                    }
                    html += `</div>`;
                    mistakesContainer.innerHTML += html;
                }
            }
        }
    } catch (e) {
        document.getElementById('q-count').innerHTML = `<span style="color: red; font-size: 16px;">Ошибка: ${e.message}</span>`;
        alert("ОШИБКА ДВИЖКА: " + e.message + "\nЕсли видишь это, сделай скриншот.");
    }
</script>
</body>
</html>
